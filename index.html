<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENNIS Y MÁS - Catálogo de Tenis</title>
    <meta name="description" content="Encuentra las mejores marcas de tenis para hombre y dama. Catálogo interactivo con atención directa por WhatsApp.">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/client.css">
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="header-container">
            <div class="logo-wrapper">
                <a href="/" id="logo-btn" class="logo-link">
                    <img src="img/logo.png" alt="Tennis y Más" class="logo-img">
                    <h1 class="logo-title">CATÁLOGO DE TENIS</h1>
                </a>
            </div>
            
            <div class="search-box">
                <span class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </span>
                <input type="text" id="search-input" class="search-input" placeholder="Buscar tenis por nombre, marca o estilo...">
            </div>
        </div>
    </header>
    

    <!-- Subheader Filter & Category Tabs -->
    <div class="filter-tabs-wrapper">
        <div class="filter-tabs-container">
            <div class="gender-tabs">
                <button class="tab-btn active" data-category="all">Todos</button>
                <button class="tab-btn" data-category="Hombre">Hombre</button>
                <button class="tab-btn" data-category="Dama">Dama</button>
            </div>
            
            
        </div>
    </div>

    

    <!-- Product Grid Section -->
    <main>
        <div class="results-info">
            <span id="results-count" class="results-count">Cargando catálogo...</span>
        </div>

        <div id="product-grid" class="product-grid">
            <!-- Dynamic product cards load -->
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 <strong>TENNIS Y MÁS</strong>. Todos los derechos reservados.</p>
        <p>¿Tienes dudas? <a href="https://wa.me/573204961453" target="_blank">Escríbenos directamente</a></p>
    </footer>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/573204961453?text=Hola%20Tennis%20y%20M%C3%A1s,%20estoy%20viendo%20el%20cat%C3%A1logo%20y%20quiero%20comprar." class="floating-whatsapp" target="_blank" aria-label="Escríbenos por WhatsApp">

    <!-- Product Details Modal Overlay -->
    <div id="product-modal" class="modal-overlay">
        <div class="modal-wrapper">
            <button id="close-modal-btn" class="close-modal-btn" aria-label="Cerrar modal">&times;</button>
            
            <div class="modal-grid">
                <!-- Left: 3-Image Carousel -->
                <div class="modal-carousel-section">
                    <div id="carousel-track" class="carousel-track">
                        <!-- Dynamic slides load -->
                    </div>
                    
                    <!-- Navigation Arrows -->
                    <button class="carousel-arrow arrow-left" id="prev-btn" aria-label="Imagen anterior">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <button class="carousel-arrow arrow-right" id="next-btn" aria-label="Siguiente imagen">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                    
                    <!-- Slide Indicators -->
                    <div id="carousel-dots" class="carousel-dots">
                        <!-- Dynamic dots load -->
                    </div>
                </div>
                
                <!-- Right: Product Information & Ordering -->
                <div class="modal-details">
                    <div>
                        <span id="modal-brand" class="modal-brand">MARCA</span>
                        <h2 id="modal-title" class="modal-title">Nombre del Modelo</h2>
                        <span id="modal-gender" class="gender-badge modal-gender">HOMBRE</span>
                    </div>

                    <div>
                        <h3 class="modal-section-title">Descripción</h3>
                        <p id="modal-description" class="modal-description">Cargando descripción del producto...</p>
                    </div>

                    <div style="display: none;">
                        <h3 class="modal-section-title">Tallas Disponibles</h3>
                        <div id="modal-sizes" class="modal-sizes-grid">
                            <!-- Dynamic sizes load -->
                        </div>
                        <div id="size-error" class="size-error-msg">Por favor, selecciona una talla antes de continuar.</div>
                    </div>

                    <!-- CTA Buttons -->
                    <button id="whatsapp-order-btn" class="whatsapp-btn">

    <!-- Data & Application Logic Scripts -->
    <script src="js/default-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
